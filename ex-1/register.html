<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href= "https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet" >
    <link rel="stylesheet" href="style.css">

</head>
<body class="content">
    <div class="container">
        <h1>Register</h1>
            <form>
                <input type="text" id="username" placeholder="Username" required class="w-full p-3 mb-4 border rounded"> 
                <input type="text" id="Email" placeholder="Email" required class="w-full p-3 mb-4 border rounded">
                <input type="password" id="password" placeholder="Password" class="w-full p-3 mb-4 border rounded">
                <input type="password" id="Confirm Password" placeholder="Confirm Password" class="w-full p-3 mb-4 border rounded">
                <label for="dob" class="block mb-2 text-sm font-medium text-gray-700">Date of Birth</label>
                <input type="date" id="dob" name="dob" required class="w-full p-3 mb-4 border rounded">
                <button type="submit" class="w-full p-3 bg-blue-500 text-white rounded hover:bg-blue-600 transition-colors">Register</button>
                <a href="login.html" class="block text-center mt-4 text-blue-500 hover:underline">Already have an account? Login</a>
            </form>

    </div>

    
</body>
</html>
